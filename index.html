/* ✅ Função para gerar cards com PROBLEMA, CAUSA e SOLUÇÃO */
function gerarCard(item, causa, solucao) {
    return `
        <div class="card">

            <div class="problemaCardTitle">${item.problema}</div>

            <div class="spnFmiTag">SPN ${item.spn} / FMI ${item.fmi}</div>

            <div class="card-title">${causa}</div>

            <div class="card-content">
                <div class="solucao">
                    ✅ ${solucao}
                </div>
            </div>
        </div>
    `;
}

/* ✅ Expandir e Recolher tudo */
function expandirTudo() {
    document.querySelectorAll('.card-content').forEach(c => c.classList.add('open'));
}

function recolherTudo() {
    document.querySelectorAll('.card-content').forEach(c => c.classList.remove('open'));
}

/* ✅ Renderização dos cards */
function renderizarBlocos(lista) {
    let html = `
        <div class="btn-group">
            <button class="btn" onclick="expandirTudo()">Expandir Tudo</button>
            <button class="btn" onclick="recolherTudo()">Recolher Tudo</button>
        </div>

        <h3 style='margin-top:25px;color:#D74A47;'>Códigos (SPN/FMI) relacionados:</h3>
    `;

    lista.forEach(e => {
        e.causas.forEach((c, i) => {
            const solucao = e.reparos[i] ?? "Sem solução cadastrada";
            html += gerarCard(e, c, solucao);
        });
    });

    document.getElementById("output").innerHTML = html;

    document.querySelectorAll(".card-title").forEach(titulo => {
        titulo.onclick = () => {
            const content = titulo.nextElementSibling;
            content.classList.toggle("open");
        };
    });
}

/* ✅ ✅ ✅ FILTRO COMBINADO SPN + FMI */
function aplicarFiltrosCombinados() {
    const spn = document.getElementById("spnInput").value.trim();
    const fmi = document.getElementById("fmiInput").value.trim();

    // Nenhum filtro → não faz nada
    if (!spn && !fmi) {
        document.getElementById("output").innerHTML = "";
        return;
    }

    // ✅ Ambos SPN e FMI preenchidos → FILTRO COMBINADO
    if (spn && fmi) {
        const filtrados = data.filter(e => e.spn == spn && e.fmi == fmi);

        if (filtrados.length === 0) {
            document.getElementById("output").innerHTML =
                "<p style='color:#ff8080;padding:20px;'>Nenhum resultado com SPN e FMI selecionados.</p>";
            return;
        }

        renderizarBlocos(filtrados);
        return;
    }

    // ✅ Apenas SPN preenchido
    if (spn) {
        const filtrados = data.filter(e => e.spn == spn);
        renderizarBlocos(filtrados);
        return;
    }

    // ✅ Apenas FMI preenchido
    if (fmi) {
        const filtrados = data.filter(e => e.fmi == fmi);
        renderizarBlocos(filtrados);
        return;
    }
}

/* ✅ Dropdown */
const searchInput = document.getElementById("problemaSearch");
const dropdownList = document.getElementById("problemaList");

function atualizarDropdown(texto) {
    dropdownList.innerHTML = "";
    let filtrados = data;

    if (texto) {
        filtrados = filtrados.filter(e =>
            e.problema.toLowerCase().includes(texto.toLowerCase())
        );
    }

    filtrados.forEach(e => {
        const item = document.createElement("div");
        item.classList.add("dropdown-item");
        item.textContent = e.problema;

        item.onclick = () => {
            dropdownList.style.display = "none";
            searchInput.value = e.problema;
            problemaSelecionado = e.problema;

            const relacionados = data.filter(x => x.problema === e.problema);
            renderizarBlocos(relacionados);
        };

        dropdownList.appendChild(item);
    });

    dropdownList.style.display = "block";
}

searchInput.addEventListener("input", () => atualizarDropdown(searchInput.value));
searchInput.addEventListener("focus", () => atualizarDropdown(""));

document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-box")) dropdownList.style.display = "none";
});

/* ✅ Eventos SPN + FMI → agora ambos chamam o filtro combinado */
document.getElementById("spnInput").addEventListener("input", aplicarFiltrosCombinados);
